name: Deploy to GitHub Pages

on:
  # 监听 main 分支的 push 操作
  push:
    branches: ["main"]
  # 允许手动触发
  workflow_dispatch:

# 设置权限以允许推送到 gh-pages 分支
permissions:
  contents: write

# 保证同一个工作流不会并发执行
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # 推送到 gh-pages 分支
          publish_branch: gh-pages
          force_orphan: true